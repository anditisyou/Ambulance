<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Dashboard - Emergency Response System</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.2/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="container">
        <!-- Navigation -->
        <nav class="navbar">
            <a href="/" class="navbar-brand">Emergency Response System</a>
            <div class="navbar-menu">
                <span id="hospitalName" class="navbar-item"></span>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
        </nav>

        <!-- Dashboard Content -->
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <h3 class="mb-4">Hospital Dashboard</h3>
                    
                    <!-- Statistics -->
                    <div class="stats-grid">
                        <div class="stat-card">
                            <h3>Pending Requests</h3>
                            <div class="stat-value" id="pendingCount">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>Accepted Today</h3>
                            <div class="stat-value" id="acceptedCount">0</div>
                        </div>
                        <div class="stat-card">
                            <h3>Total Completed</h3>
                            <div class="stat-value" id="completedCount">0</div>
                        </div>
                    </div>

                    <!-- Emergency Requests Table -->
                    <h4>Emergency Requests</h4>
                    <div class="table-responsive">
                        <table class="table">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Patient Name</th>
                                    <th>Phone</th>
                                    <th>Location</th>
                                    <th>Status</th>
                                    <th>Medical History</th>
                                    <th>Action</th>
                                </tr>
                            </thead>
                            <tbody id="emergencyTableBody">
                                <tr>
                                    <td colspan="7" class="text-center">Loading...</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Medical History Modal -->
    <div class="modal fade" id="medicalHistoryModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Patient Medical History</h5>
                    <button type="button" class="close" data-dismiss="modal">
                        <span>&times;</span>
                    </button>
                </div>
                <div class="modal-body">
                    <div id="medicalHistoryContent">
                        <!-- Medical records will be loaded here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <script src="/js/hospital-dashboard.js"></script>
</body>
</html>
